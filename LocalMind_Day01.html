<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalMind - AI Journal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e8e8;
    --muted: #666;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
  }

  .status-dot {
    display: flex; align-items: center; gap: 5px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 2s infinite;
  }

  .dot.connected { background: var(--green); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .model-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }

  .btn-sm {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .btn-sm:hover { opacity: 0.85; }
  .btn-sm.ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-sm.ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }

  .entries-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .entries-list::-webkit-scrollbar { width: 4px; }
  .entries-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .entry-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .entry-item:hover { background: var(--surface2); border-color: var(--border); }
  .entry-item.active { background: var(--surface2); border-color: var(--accent); }

  .entry-item-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .entry-item-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .entry-mood {
    font-size: 14px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 16px;
    color: var(--muted);
    font-size: 13px;
  }

  /* EDITOR AREA */
  .editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .editor-toolbar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .mood-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .mood-btn:hover, .mood-btn.selected { border-color: var(--accent); background: rgba(124,106,247,0.1); }

  .spacer { flex: 1; }

  .char-count {
    font-size: 11px;
    color: var(--muted);
  }

  .editor-body {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .journal-editor {
    flex: 1;
    background: var(--bg);
    border: none;
    color: var(--text);
    font-size: 15px;
    line-height: 1.8;
    padding: 28px 40px;
    resize: none;
    outline: none;
    font-family: 'Georgia', serif;
    overflow-y: auto;
  }

  .journal-editor::placeholder { color: var(--muted); font-style: italic; }
  .journal-editor::-webkit-scrollbar { width: 4px; }
  .journal-editor::-webkit-scrollbar-thumb { background: var(--border); }

  /* AI PANEL */
  .ai-panel {
    width: 340px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    flex-shrink: 0;
  }

  .ai-panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ai-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .ai-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .ai-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .ai-tab:hover { color: var(--text); }

  .ai-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .ai-content::-webkit-scrollbar { width: 4px; }
  .ai-content::-webkit-scrollbar-thumb { background: var(--border); }

  .ai-action-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    margin-bottom: 8px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ai-action-btn:hover { border-color: var(--accent); background: rgba(124,106,247,0.08); }
  .ai-action-btn .icon { font-size: 16px; }

  .ai-response-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    margin-top: 12px;
    min-height: 80px;
    white-space: pre-wrap;
  }

  .ai-response-box.loading {
    color: var(--muted);
    font-style: italic;
  }

  .ai-insight-card {
    background: rgba(124,106,247,0.08);
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 12px;
    line-height: 1.6;
  }

  .ai-insight-card h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--accent2);
    margin-bottom: 6px;
  }

  .chat-messages {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 12px;
  }

  .chat-msg {
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
  }

  .chat-msg.user {
    background: rgba(124,106,247,0.15);
    border: 1px solid rgba(124,106,247,0.25);
    align-self: flex-end;
    max-width: 90%;
  }

  .chat-msg.ai {
    background: var(--surface2);
    border: 1px solid var(--border);
    max-width: 95%;
    white-space: pre-wrap;
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }

  .chat-input:focus { border-color: var(--accent); }

  .send-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: opacity 0.2s;
  }

  .send-btn:hover { opacity: 0.85; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent2);
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-top: 2px;
  }

  /* DATE HEADER */
  .date-header {
    padding: 8px 40px 0;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    flex-shrink: 0;
  }

  /* OLLAMA URL input */
  .url-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    width: 180px;
    outline: none;
  }

  .url-input:focus { border-color: var(--accent); }

  .tag {
    display: inline-block;
    background: rgba(124,106,247,0.15);
    color: var(--accent2);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 9999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">&#129504;</div>
    LocalMind
    <span class="tag">OFFLINE AI</span>
  </div>
  <div class="status-bar">
    <input class="url-input" id="ollamaUrl" value="http://localhost:11434" placeholder="Ollama URL">
    <select class="model-select" id="modelSelect">
      <option value="llama3.2">llama3.2</option>
      <option value="llama3.1">llama3.1</option>
      <option value="mistral">mistral</option>
      <option value="gemma2">gemma2</option>
      <option value="phi3">phi3</option>
      <option value="qwen2.5">qwen2.5</option>
    </select>
    <div class="status-dot">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Offline</span>
    </div>
    <button class="btn-sm" onclick="checkOllama()">Connect</button>
    <button class="btn-sm" onclick="saveEntry()">Save</button>
    <button class="btn-sm ghost" onclick="newEntry()">+ New</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      Entries
      <span id="entryCount">0</span>
    </div>
    <div class="entries-list" id="entriesList">
      <div class="empty-state">No entries yet.<br>Start writing your first thought.</div>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="editor-area">
    <div class="editor-toolbar">
      <span style="font-size:12px;color:var(--muted);font-weight:600;">MOOD:</span>
      <button class="mood-btn" onclick="setMood(this,'&#128512;')">&#128512;</button>
      <button class="mood-btn" onclick="setMood(this,'&#128522;')">&#128522;</button>
      <button class="mood-btn" onclick="setMood(this,'&#128528;')">&#128528;</button>
      <button class="mood-btn" onclick="setMood(this,'&#128533;')">&#128533;</button>
      <button class="mood-btn" onclick="setMood(this,'&#128545;')">&#128545;</button>
      <button class="mood-btn" onclick="setMood(this,'&#128532;')">&#128532;</button>
      <button class="mood-btn" onclick="setMood(this,'&#129320;')">&#129320;</button>
      <div class="spacer"></div>
      <span class="char-count" id="charCount">0 words</span>
    </div>
    <div class="date-header" id="dateHeader"></div>
    <div class="editor-body">
      <textarea class="journal-editor" id="journalEditor"
        placeholder="Begin writing... Your thoughts stay local, forever private."
        oninput="onEditorInput()"></textarea>
    </div>
  </div>

  <!-- AI PANEL -->
  <div class="ai-panel">
    <div class="ai-panel-header">
      AI Companion
      <span style="font-size:10px;color:var(--green);">LOCAL</span>
    </div>
    <div class="ai-tabs">
      <div class="ai-tab active" onclick="switchTab(this,'actions')">Actions</div>
      <div class="ai-tab" onclick="switchTab(this,'chat')">Chat</div>
      <div class="ai-tab" onclick="switchTab(this,'stats')">Stats</div>
    </div>

    <!-- ACTIONS TAB -->
    <div class="ai-content" id="tab-actions">
      <button class="ai-action-btn" onclick="runAI('reflect')">
        <span class="icon">&#129504;</span>
        <div>
          <div style="font-weight:600;">Reflect</div>
          <div style="font-size:11px;color:var(--muted);">Deep psychological reflection</div>
        </div>
      </button>
      <button class="ai-action-btn" onclick="runAI('summarize')">
        <span class="icon">&#128196;</span>
        <div>
          <div style="font-weight:600;">Summarize</div>
          <div style="font-size:11px;color:var(--muted);">Condense to key points</div>
        </div>
      </button>
      <button class="ai-action-btn" onclick="runAI('emotions')">
        <span class="icon">&#127774;</span>
        <div>
          <div style="font-weight:600;">Emotion Map</div>
          <div style="font-size:11px;color:var(--muted);">Identify emotional patterns</div>
        </div>
      </button>
      <button class="ai-action-btn" onclick="runAI('advice')">
        <span class="icon">&#128161;</span>
        <div>
          <div style="font-weight:600;">Get Advice</div>
          <div style="font-size:11px;color:var(--muted);">Practical next steps</div>
        </div>
      </button>
      <button class="ai-action-btn" onclick="runAI('rewrite')">
        <span class="icon">&#9999;</span>
        <div>
          <div style="font-weight:600;">Beautify Writing</div>
          <div style="font-size:11px;color:var(--muted);">Polish prose style</div>
        </div>
      </button>
      <button class="ai-action-btn" onclick="runAI('questions')">
        <span class="icon">&#10067;</span>
        <div>
          <div style="font-weight:600;">Deep Questions</div>
          <div style="font-size:11px;color:var(--muted);">Prompts to go deeper</div>
        </div>
      </button>
      <div id="aiResponseBox" class="ai-response-box" style="display:none;"></div>
    </div>

    <!-- CHAT TAB -->
    <div class="ai-content" id="tab-chat" style="display:none;">
      <div class="chat-messages" id="chatMessages"></div>
    </div>
    <div id="chatInputArea" style="display:none;">
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" rows="1" placeholder="Talk about your journal..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
        <button class="send-btn" onclick="sendChat()">&#10148;</button>
      </div>
    </div>

    <!-- STATS TAB -->
    <div class="ai-content" id="tab-stats" style="display:none;">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="totalEntries">0</div>
          <div class="stat-label">Entries</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="totalWords">0</div>
          <div class="stat-label">Total Words</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="streakDays">0</div>
          <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="avgWords">0</div>
          <div class="stat-label">Avg Words</div>
        </div>
      </div>
      <div class="ai-insight-card">
        <h4>Mood History</h4>
        <div id="moodHistory" style="font-size:20px;letter-spacing:4px;">-</div>
      </div>
      <button class="ai-action-btn" onclick="runWeeklyInsight()">
        <span class="icon">&#128200;</span>
        <div>
          <div style="font-weight:600;">Weekly AI Insight</div>
          <div style="font-size:11px;color:var(--muted);">Patterns across all entries</div>
        </div>
      </button>
      <div id="weeklyInsightBox" class="ai-response-box" style="display:none;"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- STATE ----
var entries = JSON.parse(localStorage.getItem('lm_entries') || '[]');
var currentId = null;
var currentMood = '';
var chatHistory = [];
var ollamaConnected = false;
var activeTab = 'actions';

// ---- INIT ----
window.onload = function() {
  renderEntries();
  updateDate();
  updateStats();
  checkOllama();
  if (entries.length > 0) loadEntry(entries[entries.length - 1].id);
};

function updateDate() {
  var d = new Date();
  document.getElementById('dateHeader').textContent =
    d.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

// ---- OLLAMA ----
async function checkOllama() {
  var url = document.getElementById('ollamaUrl').value.trim();
  try {
    var r = await fetch(url + '/api/tags', {method:'GET'});
    if (r.ok) {
      var data = await r.json();
      ollamaConnected = true;
      document.getElementById('statusDot').className = 'dot connected';
      document.getElementById('statusText').textContent = 'Connected';
      // populate models
      if (data.models && data.models.length > 0) {
        var sel = document.getElementById('modelSelect');
        sel.innerHTML = '';
        data.models.forEach(function(m) {
          var opt = document.createElement('option');
          opt.value = m.name;
          opt.textContent = m.name;
          sel.appendChild(opt);
        });
      }
      showToast('Ollama connected');
    }
  } catch(e) {
    ollamaConnected = false;
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = 'Offline';
  }
}

async function callOllama(prompt) {
  var url = document.getElementById('ollamaUrl').value.trim();
  var model = document.getElementById('modelSelect').value;
  var r = await fetch(url + '/api/generate', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({model: model, prompt: prompt, stream: false})
  });
  if (!r.ok) throw new Error('Ollama error');
  var data = await r.json();
  return data.response;
}

// ---- ENTRIES ----
function newEntry() {
  currentId = Date.now().toString();
  currentMood = '';
  document.getElementById('journalEditor').value = '';
  document.getElementById('charCount').textContent = '0 words';
  document.querySelectorAll('.mood-btn').forEach(function(b){b.classList.remove('selected');});
  document.getElementById('aiResponseBox').style.display = 'none';
  chatHistory = [];
  document.getElementById('chatMessages').innerHTML = '';
  renderEntries();
  updateDate();
}

function saveEntry() {
  var text = document.getElementById('journalEditor').value.trim();
  if (!text) { showToast('Nothing to save'); return; }
  var id = currentId || Date.now().toString();
  currentId = id;
  var existing = entries.findIndex(function(e){return e.id === id;});
  var entry = {
    id: id,
    text: text,
    mood: currentMood,
    date: new Date().toISOString(),
    title: text.split('\n')[0].substring(0, 40) || 'Untitled'
  };
  if (existing >= 0) entries[existing] = entry;
  else entries.push(entry);
  localStorage.setItem('lm_entries', JSON.stringify(entries));
  renderEntries();
  updateStats();
  showToast('Entry saved');
}

function loadEntry(id) {
  var e = entries.find(function(x){return x.id === id;});
  if (!e) return;
  currentId = id;
  currentMood = e.mood || '';
  document.getElementById('journalEditor').value = e.text;
  onEditorInput();
  document.querySelectorAll('.mood-btn').forEach(function(b){
    b.classList.toggle('selected', b.textContent === currentMood);
  });
  document.getElementById('aiResponseBox').style.display = 'none';
  chatHistory = [];
  document.getElementById('chatMessages').innerHTML = '';
  renderEntries();
}

function deleteEntry(id, event) {
  event.stopPropagation();
  entries = entries.filter(function(e){return e.id !== id;});
  localStorage.setItem('lm_entries', JSON.stringify(entries));
  if (currentId === id) {
    currentId = null;
    document.getElementById('journalEditor').value = '';
  }
  renderEntries();
  updateStats();
  showToast('Deleted');
}

function renderEntries() {
  var list = document.getElementById('entriesList');
  document.getElementById('entryCount').textContent = entries.length;
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty-state">No entries yet.<br>Start writing your first thought.</div>';
    return;
  }
  var sorted = entries.slice().reverse();
  list.innerHTML = sorted.map(function(e) {
    var d = new Date(e.date);
    var dateStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return '<div class="entry-item' + (e.id === currentId ? ' active' : '') + '" onclick="loadEntry(\'' + e.id + '\')">' +
      '<div class="entry-item-title">' + escHtml(e.title) + '</div>' +
      '<div class="entry-item-meta"><span>' + dateStr + '</span><span class="entry-mood">' + (e.mood || '') + '</span></div>' +
      '</div>';
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function onEditorInput() {
  var text = document.getElementById('journalEditor').value;
  var words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('charCount').textContent = words + ' word' + (words !== 1 ? 's' : '');
}

function setMood(btn, emoji) {
  document.querySelectorAll('.mood-btn').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  currentMood = emoji;
}

// ---- AI ACTIONS ----
var prompts = {
  reflect: 'You are a compassionate therapist. The user wrote this journal entry. Provide a deep, empathetic psychological reflection in 3-4 sentences. Entry:\n\n',
  summarize: 'Summarize this journal entry in 2-3 concise bullet points capturing the key thoughts:\n\n',
  emotions: 'Analyze the emotions present in this journal entry. List 3-5 emotions detected with brief explanations:\n\n',
  advice: 'Based on this journal entry, provide 3 practical, actionable pieces of advice to help the writer:\n\n',
  rewrite: 'Rewrite this journal entry in a more polished, literary prose style while keeping all the original meaning:\n\n',
  questions: 'Based on this journal entry, generate 4 thought-provoking questions that would help the writer explore their thoughts deeper:\n\n'
};

async function runAI(type) {
  var text = document.getElementById('journalEditor').value.trim();
  if (!text) { showToast('Write something first'); return; }
  if (!ollamaConnected) { showToast('Connect to Ollama first'); return; }
  var box = document.getElementById('aiResponseBox');
  box.style.display = 'block';
  box.className = 'ai-response-box loading';
  box.textContent = 'Thinking...';
  try {
    var result = await callOllama(prompts[type] + text);
    box.className = 'ai-response-box';
    box.textContent = result;
  } catch(e) {
    box.className = 'ai-response-box';
    box.textContent = 'Error: ' + e.message;
  }
}

// ---- CHAT ----
async function sendChat() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  if (!ollamaConnected) { showToast('Connect to Ollama first'); return; }
  input.value = '';

  var messages = document.getElementById('chatMessages');
  messages.innerHTML += '<div class="chat-msg user">' + escHtml(msg) + '</div>';
  messages.innerHTML += '<div class="chat-msg ai" id="typingMsg">Thinking...</div>';
  messages.scrollTop = messages.scrollHeight;

  var journalContext = document.getElementById('journalEditor').value.trim();
  var contextStr = journalContext ? 'The user is writing this journal entry:\n\n' + journalContext + '\n\n' : '';
  var historyStr = chatHistory.map(function(h){return h.role+': '+h.text;}).join('\n');
  var fullPrompt = contextStr + 'Conversation so far:\n' + historyStr + '\nUser: ' + msg + '\nAssistant:';

  try {
    var result = await callOllama(fullPrompt);
    chatHistory.push({role:'User', text: msg});
    chatHistory.push({role:'Assistant', text: result});
    document.getElementById('typingMsg').textContent = result;
    document.getElementById('typingMsg').removeAttribute('id');
    messages.scrollTop = messages.scrollHeight;
  } catch(e) {
    document.getElementById('typingMsg').textContent = 'Error: ' + e.message;
    document.getElementById('typingMsg').removeAttribute('id');
  }
}

// ---- STATS ----
function updateStats() {
  document.getElementById('totalEntries').textContent = entries.length;
  var totalWords = entries.reduce(function(acc, e){
    return acc + (e.text.trim() ? e.text.trim().split(/\s+/).length : 0);
  }, 0);
  document.getElementById('totalWords').textContent = totalWords;
  document.getElementById('avgWords').textContent = entries.length ? Math.round(totalWords/entries.length) : 0;

  // streak
  var streak = 0;
  if (entries.length > 0) {
    var dates = entries.map(function(e){return new Date(e.date).toDateString();});
    var unique = [...new Set(dates)].sort();
    streak = 1;
    var today = new Date().toDateString();
    for (var i = unique.length - 1; i > 0; i--) {
      var d1 = new Date(unique[i]), d2 = new Date(unique[i-1]);
      if ((d1 - d2) === 86400000) streak++;
      else break;
    }
  }
  document.getElementById('streakDays').textContent = streak;

  var moods = entries.slice(-10).map(function(e){return e.mood || '-';});
  document.getElementById('moodHistory').textContent = moods.join(' ');
}

async function runWeeklyInsight() {
  if (!ollamaConnected) { showToast('Connect to Ollama first'); return; }
  if (entries.length === 0) { showToast('No entries yet'); return; }
  var box = document.getElementById('weeklyInsightBox');
  box.style.display = 'block';
  box.className = 'ai-response-box loading';
  box.textContent = 'Analyzing patterns...';
  var recent = entries.slice(-7).map(function(e, i){return 'Entry '+(i+1)+': '+e.text.substring(0,200);}).join('\n\n');
  var prompt = 'Analyze these recent journal entries and identify: 1) recurring themes, 2) emotional patterns, 3) growth observations, 4) one encouraging insight. Keep it concise.\n\n' + recent;
  try {
    var result = await callOllama(prompt);
    box.className = 'ai-response-box';
    box.textContent = result;
  } catch(e) {
    box.className = 'ai-response-box';
    box.textContent = 'Error: ' + e.message;
  }
}

// ---- TABS ----
function switchTab(btn, tab) {
  document.querySelectorAll('.ai-tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  activeTab = tab;
  document.getElementById('tab-actions').style.display = tab === 'actions' ? 'block' : 'none';
  document.getElementById('tab-chat').style.display = tab === 'chat' ? 'flex' : 'none';
  document.getElementById('tab-stats').style.display = tab === 'stats' ? 'block' : 'none';
  document.getElementById('chatInputArea').style.display = tab === 'chat' ? 'block' : 'none';
  if (tab === 'stats') updateStats();
}

// ---- TOAST ----
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 2000);
}

// ---- KEYBOARD ----
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveEntry(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); newEntry(); }
});
</script>
